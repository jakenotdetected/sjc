<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Math Quest — Learn Math from the Beginning</title>
<style>
  :root{
    --bg:#0f1424; --panel:#171d33; --panel2:#1f2740; --line:#2b3656;
    --text:#eef2ff; --muted:#9aa6c7; --brand:#5b8cff; --brand2:#7a6bff;
    --good:#28c08a; --bad:#ff6b6b; --gold:#ffc94d; --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
  a{color:var(--brand);}
  .wrap{max-width:1080px;margin:0 auto;padding:20px;}
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo .mark{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;}
  .logo h1{font-size:22px;letter-spacing:.3px;}
  .logo p{font-size:13px;color:var(--muted);}
  .scoreboard{display:flex;gap:10px;}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;}
  .layout{display:grid;grid-template-columns:300px 1fr;gap:18px;}
  @media(max-width:820px){.layout{grid-template-columns:1fr;}}
  .sidebar{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;height:max-content;}
  .sidebar h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:6px 8px 10px;}
  .lvl{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:1px solid transparent;color:var(--text);padding:11px 10px;border-radius:12px;cursor:pointer;font-size:15px;font-family:inherit;transition:.15s;}
  .lvl:hover{background:var(--panel2);}
  .lvl.active{background:var(--panel2);border-color:var(--brand);}
  .lvl .num{width:26px;height:26px;border-radius:8px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex:0 0 auto;}
  .lvl.active .num{background:var(--brand);color:#fff;}
  .lvl .done{margin-left:auto;color:var(--good);font-weight:700;}
  .stage{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;min-height:460px;}
  .crumb{font-size:13px;color:var(--muted);margin-bottom:6px;}
  .stage h2{font-size:24px;margin-bottom:14px;}
  .lesson{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:18px;}
  .lesson p{margin-bottom:8px;}
  .lesson .ex{font-family:"Cascadia Code",Consolas,monospace;background:#10162b;border:1px solid var(--line);border-radius:8px;padding:10px 12px;display:inline-block;margin:4px 6px 4px 0;font-size:16px;color:#cfe0ff;}
  .lesson b{color:var(--gold);}
  .qcard{text-align:center;padding:8px 0 4px;}
  .qmeta{font-size:13px;color:var(--muted);margin-bottom:10px;}
  .qbig{font-size:40px;font-weight:800;letter-spacing:1px;margin:6px 0 22px;}
  .opts{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .opt{min-width:96px;font-size:22px;font-weight:700;font-family:inherit;color:var(--text);background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;cursor:pointer;transition:.12s;}
  .opt:hover:not(:disabled){border-color:var(--brand);transform:translateY(-2px);}
  .opt:disabled{cursor:default;}
  .opt.good{background:rgba(40,192,138,.18);border-color:var(--good);}
  .opt.bad{background:rgba(255,107,107,.18);border-color:var(--bad);}
  .fb{min-height:26px;margin-top:18px;font-size:18px;font-weight:600;}
  .fb.good{color:var(--good);}
  .fb.bad{color:var(--bad);}
  .progress{height:8px;background:var(--panel2);border-radius:999px;overflow:hidden;margin:14px 0 4px;}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));width:0;transition:.3s;}
  .btn{font-family:inherit;font-size:15px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));border:none;border-radius:10px;padding:11px 20px;cursor:pointer;margin-top:14px;}
  .btn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--text);}
  .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .win{text-align:center;padding:30px 10px;}
  .win .big{font-size:60px;}
  .win h3{font-size:26px;margin:8px 0;}
  .muted{color:var(--muted);}
  footer{text-align:center;color:var(--muted);font-size:13px;margin-top:22px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="mark">∑</div>
      <div>
        <h1>Math Quest</h1>
        <p>Learn math from the beginning — one step at a time</p>
      </div>
    </div>
    <div class="scoreboard">
      <div class="pill">⭐ <span id="stars">0</span></div>
      <div class="pill">🏅 <span id="badges">0</span>/<span id="total">0</span></div>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar">
      <h2>Levels — easy to hard</h2>
      <div id="levelList"></div>
    </nav>
    <main class="stage" id="stage"></main>
  </div>

  <footer>Made for learning · open this file anytime to practice · your stars are saved on this device.</footer>
</div>

<script>
"use strict";

/* ---------- helpers ---------- */
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function uniqOpts(correct, makeWrong){
  var set=[String(correct)];
  var guard=0;
  while(set.length<4 && guard++<50){var w=String(makeWrong());if(set.indexOf(w)===-1)set.push(w);}
  return shuffle(set);
}

/* ---------- the curriculum: basics -> complex ---------- */
/* each level: title, lesson (HTML), gen() -> {q, answer, opts} */
var LEVELS = [
  {
    title:"Counting numbers",
    lesson:"<p>Numbers tell us <b>how many</b>. We count: 1, 2, 3, 4, 5...</p>"+
           "<p>Look at the dots and count them one by one.</p>"+
           "<span class='ex'>● ● ●  = 3</span>",
    gen:function(){
      var n=rnd(2,9), dots="";
      for(var i=0;i<n;i++)dots+="● ";
      return {q:dots.trim(), big:true, answer:n, opts:uniqOpts(n,function(){return rnd(1,12);})};
    }
  },
  {
    title:"Addition (+)",
    lesson:"<p><b>Adding</b> means putting groups together to get a bigger number.</p>"+
           "<span class='ex'>2 + 3 = 5</span><span class='ex'>4 + 1 = 5</span>"+
           "<p>Tip: start at the first number and count up.</p>",
    gen:function(){var a=rnd(1,9),b=rnd(1,9);return {q:a+" + "+b, answer:a+b, opts:uniqOpts(a+b,function(){return a+b+rnd(-3,3);})};}
  },
  {
    title:"Subtraction (−)",
    lesson:"<p><b>Subtracting</b> means taking some away. You end with a smaller number.</p>"+
           "<span class='ex'>5 − 2 = 3</span><span class='ex'>9 − 4 = 5</span>",
    gen:function(){var a=rnd(3,12),b=rnd(1,a);return {q:a+" − "+b, answer:a-b, opts:uniqOpts(a-b,function(){return Math.max(0,a-b+rnd(-3,3));})};}
  },
  {
    title:"Multiplication (×)",
    lesson:"<p><b>Multiplying</b> is fast adding of the same number.</p>"+
           "<span class='ex'>3 × 4 = 3+3+3+3 = 12</span>"+
           "<p>It means \"3, four times\".</p>",
    gen:function(){var a=rnd(2,9),b=rnd(2,9);return {q:a+" × "+b, answer:a*b, opts:uniqOpts(a*b,function(){return a*b+rnd(1,5)*(Math.random()<.5?-1:1);})};}
  },
  {
    title:"Division (÷)",
    lesson:"<p><b>Dividing</b> means sharing equally into groups.</p>"+
           "<span class='ex'>12 ÷ 3 = 4</span>"+
           "<p>12 shared into 3 groups gives 4 in each.</p>",
    gen:function(){var b=rnd(2,9),ans=rnd(2,9),a=b*ans;return {q:a+" ÷ "+b, answer:ans, opts:uniqOpts(ans,function(){return Math.max(1,ans+rnd(-3,3));})};}
  },
  {
    title:"Order of operations",
    lesson:"<p>When a sum has many parts, do them in order: <b>× and ÷ first</b>, then <b>+ and −</b>.</p>"+
           "<span class='ex'>2 + 3 × 4 = 2 + 12 = 14</span>"+
           "<p>Not 20! Multiply before you add.</p>",
    gen:function(){var a=rnd(1,6),b=rnd(2,6),c=rnd(2,6);var ans=a+b*c;return {q:a+" + "+b+" × "+c, answer:ans, opts:uniqOpts(ans,function(){return (a+b)*c + rnd(-2,2);})};}
  },
  {
    title:"Fractions",
    lesson:"<p>A <b>fraction</b> is part of a whole. The bottom is how many equal parts; the top is how many we take.</p>"+
           "<span class='ex'>1/2 of 8 = 4</span><span class='ex'>1/4 of 12 = 3</span>"+
           "<p>To find 1/n of a number, divide by n.</p>",
    gen:function(){var n=rnd(2,5),ans=rnd(2,9),whole=n*ans;return {q:"1/"+n+" of "+whole, answer:ans, opts:uniqOpts(ans,function(){return Math.max(1,ans+rnd(-3,3));})};}
  },
  {
    title:"Percentages",
    lesson:"<p><b>Percent</b> means \"out of 100\". 50% is half, 25% is a quarter, 10% is one tenth.</p>"+
           "<span class='ex'>50% of 80 = 40</span><span class='ex'>10% of 200 = 20</span>"+
           "<p>Trick: 10% = move the decimal one place left.</p>",
    gen:function(){var p=[10,20,25,50][rnd(0,3)];var base=rnd(2,9)*20;var ans=base*p/100;return {q:p+"% of "+base, answer:ans, opts:uniqOpts(ans,function(){return Math.round(ans+rnd(-1,2)*5);})};}
  },
  {
    title:"Powers (exponents)",
    lesson:"<p>A <b>power</b> means multiply a number by itself.</p>"+
           "<span class='ex'>3² = 3 × 3 = 9</span><span class='ex'>2³ = 2 × 2 × 2 = 8</span>"+
           "<p>The small number says how many times.</p>",
    gen:function(){var base=rnd(2,6),exp=rnd(2,3);var ans=Math.pow(base,exp);return {q:base+(exp===2?"²":"³"), answer:ans, opts:uniqOpts(ans,function(){return ans+rnd(1,6)*(Math.random()<.5?-1:1);})};}
  },
  {
    title:"Basic algebra — solve for x",
    lesson:"<p>In algebra, <b>x</b> is a hidden number. Find it by undoing the operation.</p>"+
           "<span class='ex'>x + 5 = 12  →  x = 7</span><span class='ex'>3x = 12  →  x = 4</span>"+
           "<p>Do the opposite: if it adds, subtract; if it multiplies, divide.</p>",
    gen:function(){
      if(Math.random()<.5){var x=rnd(2,15),b=rnd(1,9);return {q:"x + "+b+" = "+(x+b), answer:x, opts:uniqOpts(x,function(){return Math.max(0,x+rnd(-4,4));})};}
      var x2=rnd(2,9),m=rnd(2,6);return {q:m+"x = "+(m*x2), answer:x2, opts:uniqOpts(x2,function(){return Math.max(1,x2+rnd(-3,3));})};
    }
  },
  {
    title:"Area of shapes",
    lesson:"<p><b>Area</b> is the space inside a shape, measured in squares.</p>"+
           "<p>Rectangle area = <b>length × width</b>. Triangle area = <b>½ × base × height</b>.</p>"+
           "<span class='ex'>Rectangle 5 × 4 = 20</span>",
    gen:function(){
      if(Math.random()<.5){var l=rnd(3,12),w=rnd(2,9);return {q:"Rectangle "+l+" × "+w, answer:l*w, opts:uniqOpts(l*w,function(){return l*w+rnd(1,6)*(Math.random()<.5?-1:1);})};}
      var base=rnd(2,6)*2,h=rnd(2,9);var ans=base*h/2;return {q:"Triangle: base "+base+", height "+h, answer:ans, opts:uniqOpts(ans,function(){return ans+rnd(1,6)*(Math.random()<.5?-1:1);})};
    }
  }
];

var Q_PER_LEVEL = 5;
var PASS = 4; // need 4/5 to earn the badge

/* ---------- state (saved on device) ---------- */
var state = JSON.parse(localStorage.getItem("mathQuest")||"{}");
state.stars = state.stars||0;
state.passed = state.passed||{}; // {levelIndex:true}
function save(){localStorage.setItem("mathQuest", JSON.stringify(state));}

var stageEl = document.getElementById("stage");
var listEl = document.getElementById("levelList");
var current = 0;

document.getElementById("total").textContent = LEVELS.length;

function refreshHUD(){
  document.getElementById("stars").textContent = state.stars;
  document.getElementById("badges").textContent = Object.keys(state.passed).length;
}

function renderList(){
  listEl.innerHTML="";
  LEVELS.forEach(function(lv,i){
    var b=document.createElement("button");
    b.className="lvl"+(i===current?" active":"");
    b.innerHTML="<span class='num'>"+(i+1)+"</span><span>"+lv.title+"</span>"+
                (state.passed[i]?"<span class='done'>✓</span>":"");
    b.onclick=function(){current=i;startLevel();};
    listEl.appendChild(b);
  });
}

/* ---------- play a level ---------- */
function startLevel(){
  renderList();
  var lv=LEVELS[current];
  var idx=0, correct=0;
  var questions=[];
  for(var i=0;i<Q_PER_LEVEL;i++)questions.push(lv.gen());

  function showQ(){
    if(idx>=questions.length)return finish();
    var qd=questions[idx];
    var pct=Math.round((idx/questions.length)*100);
    stageEl.innerHTML=
      "<div class='crumb'>Level "+(current+1)+" of "+LEVELS.length+"</div>"+
      "<h2>"+lv.title+"</h2>"+
      (idx===0?"<div class='lesson'>"+lv.lesson+"</div>":"")+
      "<div class='progress'><i style='width:"+pct+"%'></i></div>"+
      "<div class='qcard'>"+
        "<div class='qmeta'>Question "+(idx+1)+" of "+questions.length+"</div>"+
        "<div class='qbig'>"+qd.q+(qd.big?"":" = ?")+"</div>"+
        "<div class='opts' id='opts'></div>"+
        "<div class='fb' id='fb'></div>"+
      "</div>";
    var box=document.getElementById("opts");
    qd.opts.forEach(function(o){
      var btn=document.createElement("button");
      btn.className="opt";btn.textContent=o;
      btn.onclick=function(){pick(btn,o,qd);};
      box.appendChild(btn);
    });
  }

  function pick(btn,o,qd){
    var fb=document.getElementById("fb");
    var all=document.querySelectorAll("#opts .opt");
    all.forEach(function(x){x.disabled=true;});
    if(o===String(qd.answer)){
      btn.classList.add("good");
      fb.className="fb good";fb.textContent="✓ Correct! Nice work.";
      correct++;state.stars++;refreshHUD();save();
    }else{
      btn.classList.add("bad");
      fb.className="fb bad";fb.textContent="Not quite — the answer is "+qd.answer+".";
      all.forEach(function(x){if(x.textContent===String(qd.answer))x.classList.add("good");});
    }
    var nb=document.createElement("button");
    nb.className="btn";
    nb.textContent=(idx===questions.length-1?"See results":"Next question");
    nb.onclick=function(){idx++;showQ();};
    fb.appendChild(document.createElement("br"));
    fb.appendChild(nb);
  }

  function finish(){
    var passedNow=correct>=PASS;
    if(passedNow && !state.passed[current]){state.passed[current]=true;save();refreshHUD();}
    var nextExists=current<LEVELS.length-1;
    stageEl.innerHTML=
      "<div class='win'>"+
        "<div class='big'>"+(passedNow?"🏆":"💪")+"</div>"+
        "<h3>"+(passedNow?"Level complete!":"Good try — almost there!")+"</h3>"+
        "<p class='muted'>You got <b style='color:var(--gold)'>"+correct+" / "+questions.length+"</b> correct.</p>"+
        (passedNow?"<p class='muted'>You earned this level's badge. ⭐</p>":"<p class='muted'>Get "+PASS+" right to earn the badge. Try again!</p>")+
        "<div class='row'>"+
          "<button class='btn ghost' id='retry'>Practice again</button>"+
          (nextExists?"<button class='btn' id='next'>Next level →</button>":"")+
        "</div>"+
      "</div>";
    document.getElementById("retry").onclick=startLevel;
    if(nextExists)document.getElementById("next").onclick=function(){current++;startLevel();};
  }

  showQ();
}

/* ---------- boot ---------- */
refreshHUD();
renderList();
startLevel();
</script>
</body>
</html>
