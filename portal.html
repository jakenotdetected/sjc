<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#2a0808"/>
  <title>Student Portal Maintenance — SJC Counselling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --maroon: #7a1818;
      --maroon-deep: #2a0808;
      --gold: #c9a84c;
      --gold-dark: #a07830;
      --cream: #faf6ee;
      --white: #ffffff;
      --ink: #1a0e0e;
      --muted: #7a6868;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      overflow: hidden;
    }
    
    .maintenance-container {
      max-width: 480px;
      width: 100%;
      background: var(--white);
      border: 1px solid rgba(122, 24, 24, 0.08);
      border-radius: 20px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(42, 8, 8, 0.06);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    
    .logo-badge {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--maroon-deep);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 6px 16px rgba(122, 24, 24, 0.15);
      animation: float 3s ease-in-out infinite;
    }
    
    .logo-badge svg {
      color: var(--gold);
    }
    
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--maroon-deep);
      margin-bottom: 12px;
    }
    
    p {
      font-size: 0.92rem;
      line-height: 1.65;
      color: var(--muted);
      margin-bottom: 32px;
    }
    
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: var(--maroon-deep);
      color: var(--cream);
      font-weight: 600;
      font-size: 0.85rem;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(42, 8, 8, 0.15);
    }
    
    .btn-home:hover {
      background: var(--maroon);
      transform: translateY(-1px);
    }
    
    .progress-bar-container {
      width: 100%;
      height: 4px;
      background: rgba(122, 24, 24, 0.05);
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    
    .progress-bar-fill {
      height: 100%;
      width: 35%;
      background: linear-gradient(90deg, var(--gold), var(--gold-bright, #e8c96a));
      border-radius: 2px;
      animation: pulseProgress 2.5s infinite ease-in-out;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    
    @keyframes pulseProgress {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(200%); }
      100% { transform: translateX(-100%); }
    }
  </style>
  <link rel="stylesheet" href="/loader.css?v=9">
</head>
<body>
  <!-- Page Loader Overlay -->
  <div id="sjc-page-loader">
    <div class="sjc-loader-content">
      <img class="sjc-loader-logo" src="/logo.jpg" alt="SJC Logo">
      <h1 class="sjc-loader-title">St. Joseph's College</h1>
      <p class="sjc-loader-sub">Career Guidance Unit</p>
      <div class="sjc-loader-bar">
        <div class="sjc-loader-progress"></div>
      </div>
    </div>
  </div>
  <div class="maintenance-container">
    <div class="logo-badge">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <h1>Portal Under Maintenance</h1>
    <p>We are currently upgrading the SJC Student Portal to bring you an improved experience. Please check back later. If you need urgent assistance, you can still book appointments or contact us directly.</p>
    <div class="progress-bar-container">
      <div class="progress-bar-fill"></div>
    </div>
    <a href="/" class="btn-home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Return to Home
    </a>
  </div>
  <script src="/loader.js?v=9" defer></script>
</body>
</html>
